services:
  - type: web
    name: dermora
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/db
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DERMORA_EXPOSE_DEV_OTP
        value: "true"
